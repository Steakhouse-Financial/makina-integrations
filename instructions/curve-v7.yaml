- is_debt: false
  instruction_type: "MANAGEMENT"
  affected_tokens:
    - ${position.tokena_address}
    - ${position.tokenb_address}
  instruction:
    label: ${position.label}
    path: "../../../blueprints/curve/v7/deposit.yaml:deposit"
    inputs:
      tokena_address:
        type: "address"
        value: ${position.tokena_address}
      tokenb_address:
        type: "address"
        value: ${position.tokenb_address}
      pool_address:
        type: "address"
        value: ${position.pool_address}
