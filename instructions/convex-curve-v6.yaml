- is_debt: false
  instruction_type: "MANAGEMENT"
  affected_tokens:
    - ${position.tokena_address}
    - ${position.tokenb_address}
  instruction:
    label: ${position.label}
    path: "../../../blueprints/convex-curve/v6/deposit.yaml:deposit"
    inputs:
      tokena_address:
        type: "address"
        value: ${position.tokena_address}
      tokenb_address:
        type: "address"
        value: ${position.tokenb_address}
      curve_pool_address:
        type: "address"
        value: ${position.curve_pool_address}
      curve_lp_token_address:
        type: "address"
        value: ${position.curve_pool_address}
      convex_booster_address:
        type: "address"
        value: "0xF403C135812408BFbE8713b5A23a04b3D48AAE31"
      pool_id:
        type: "uint256"
        value: ${position.convex_pool_id}

- is_debt: false
  instruction_type: "ACCOUNTING"
  affected_tokens:
    - ${position.tokena_address}
  instruction:
    label: ${position.label}
    path: "../../../blueprints/convex-curve/v6/account-in-coin0.yaml:account_in_coin0"
    inputs:
      convex_reward_pool:
        type: "address"
        value: ${position.convex_reward_pool}
      pool_address:
        type: "address"
        value: ${position.curve_pool_address}
      caliber_address:
        type: "address"
        value: "${config.caliber_address}"
      unsigned_math_helper:
        type: "address"
        value: "${config.unsigned_math_helper_address}"
      coin0_scale_factor:
        type: "uint256"
        value: ${position.coin0_scale_factor}

- is_debt: false
  instruction_type: "HARVEST"
  affected_tokens: []
  instruction:
    label: ${position.label}
    path: "../../../blueprints/convex-curve/harvest.yaml:harvest"
    inputs:
      convex_reward_contract_address:
        type: "address"
        value: ${position.convex_reward_pool}
      caliber_address:
        type: "address"
        value: "${config.caliber_address}"

- is_debt: false
  instruction_type: "MANAGEMENT"
  affected_tokens:
    - ${position.tokena_address}
    - ${position.tokenb_address}
  instruction:
    label: ${position.label}
    path: "../../../blueprints/convex-curve/v6/withdraw.yaml:withdraw_balanced"
    inputs:
      convex_reward_contract_address:
        type: "address"
        value: ${position.convex_reward_pool}
      curve_pool_address:
        type: "address"
        value: ${position.curve_pool_address}
      caliber_address:
        type: "address"
        value: "${config.caliber_address}"

- is_debt: false
  instruction_type: "MANAGEMENT"
  affected_tokens:
    - ${position.tokena_address}
    - ${position.tokenb_address}
  instruction:
    label: ${position.label}
    path: "../../../blueprints/convex-curve/v6/withdraw.yaml:withdraw_balanced_relative"
    inputs:
      convex_reward_contract_address:
        type: "address"
        value: ${position.convex_reward_pool}
      curve_pool_address:
        type: "address"
        value: ${position.curve_pool_address}
      caliber_address:
        type: "address"
        value: "${config.caliber_address}"
      unsigned_math_helper:
        type: "address"
        value: "${config.unsigned_math_helper_address}"
