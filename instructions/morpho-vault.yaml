- is_debt: false
  instruction_type: "MANAGEMENT"
  affected_tokens:
    - ${position.asset_address}
  instruction:
    label: ${position.label}
    path: "../../../blueprints/morpho/deposit.yaml:deposit_vault"
    inputs:
      asset_address:
        type: "address"
        value: ${position.asset_address}
      vault_address:
        type: "address"
        value: ${position.vault_address}
      caliber_address:
        type: "address"
        value: "${config.caliber_address}"

- is_debt: false
  instruction_type: "ACCOUNTING"
  affected_tokens:
    - ${position.asset_address}
  instruction:
    label: ${position.label}
    path: "../../../blueprints/morpho/account.yaml:account_vault"
    inputs:
      vault_address:
        type: "address"
        value: ${position.vault_address}
      subject:
        type: "address"
        value: "${config.caliber_address}"

- is_debt: false
  instruction_type: "MANAGEMENT"
  affected_tokens:
    - ${position.asset_address}
  instruction:
    label: ${position.label}
    path: "../../../blueprints/morpho/withdraw.yaml:redeem_vault"
    inputs:
      vault_address:
        type: "address"
        value: ${position.vault_address}
      receiver_address:
        type: "address"
        value: "${config.caliber_address}"

- is_debt: false
  instruction_type: "MANAGEMENT"
  affected_tokens:
    - ${position.asset_address}
  instruction:
    label: ${position.label}
    path: "../../../blueprints/morpho/withdraw.yaml:redeem_vault_relative"
    inputs:
      vault_address:
        type: "address"
        value: ${position.vault_address}
      receiver_address:
        type: "address"
        value: "${config.caliber_address}"
      unsigned_math_helper:
        type: "address"
        value: "${config.unsigned_math_helper_address}"
