# Validates that rootfile token_list references use the correct chain.
# Catches copy-paste bugs where ${token_list.mainnet.X} ends up in a base/ rootfile.

name: Token Chains

on:
  pull_request:
  workflow_dispatch:

jobs:
  validate-token-chains:
    name: Validate token_list chain references in rootfiles
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changes
        id: changes
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            CHANGED_FILES=$(git diff --name-only --diff-filter=AM "origin/$BASE_REF" -- 'machines/*/*/rootfiles/*.toml')
            SCRIPT_CHANGED=$(git diff --name-only "origin/$BASE_REF" -- 'scripts/validate_token_chains.py' 'tests/test_validate_token_chains.py')
          else
            CHANGED_FILES=""
            SCRIPT_CHANGED=""
          fi

          if [ -z "$CHANGED_FILES" ]; then
            echo "changed_files=" >> "$GITHUB_OUTPUT"
            echo "changed_files_count=0" >> "$GITHUB_OUTPUT"
          else
            {
              echo "changed_files<<ROOTFILES_EOF"
              echo "$CHANGED_FILES"
              echo "ROOTFILES_EOF"
            } >> "$GITHUB_OUTPUT"
            echo "changed_files_count=$(echo "$CHANGED_FILES" | wc -l | tr -d ' ')" >> "$GITHUB_OUTPUT"
          fi

          if [ -n "$SCRIPT_CHANGED" ]; then
            echo "script_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "script_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install uv
        if: steps.changes.outputs.changed_files_count > 0 || steps.changes.outputs.script_changed == 'true'
        uses: astral-sh/setup-uv@v7

      - name: Run unit tests
        if: steps.changes.outputs.changed_files_count > 0 || steps.changes.outputs.script_changed == 'true'
        run: uv run python -m unittest tests.test_validate_token_chains -v

      - name: Validate token chain references
        if: steps.changes.outputs.changed_files_count > 0
        env:
          CHANGED_ROOTFILES: ${{ steps.changes.outputs.changed_files }}
        run: uv run python scripts/validate_token_chains.py ${CHANGED_ROOTFILES}

      - name: Skip when no rootfiles changed
        if: steps.changes.outputs.changed_files_count == 0 && steps.changes.outputs.script_changed == 'false'
        run: echo "No added/modified rootfiles to validate."
