protocol: "morpho"

constants:
  usdc:
    type: "address"
    value: "0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48"

inputs:
  swap_module:
    type: "address"
  wsrusd:
    type: "address"
  morpho_address:
    type: "address"
  caliber_helper:
    type: "address"
  morpho_market_id:
    type: "bytes32"
  caliber_address:
    type: "address"

# Withdraw collateral flow:
# 1. Get market params
# 2. Withdraw wsrUSD collateral from Morpho
# 3. Approve swap module to spend wsrUSD
# 4. Swap wsrUSD -> USDC (always USDC — DEX aggregator handles wsrUSD -> rUSD redemption)

actions:
  withdraw_collateral:
    calls:
      - description: "Get market parameters from ID"
        target: "${inputs.morpho_address}"
        selector: "idToMarketParams(bytes32)"
        parameters:
          - type: "bytes32"
            value: "${inputs.morpho_market_id}"
        return:
          name: "market_params"
          type: "(address,address,address,address,uint256)"

      - description: "Extract loan token from market params"
        target: "${inputs.caliber_helper}"
        selector: "extractElementFromStaticTuple(bytes,uint256)"
        parameters:
          - type: "(address,address,address,address,uint256)"
            value: "${returns.market_params}"
          - type: "uint256"
            value: "0"
        return:
          name: "loan_token"
          type: "address"

      - description: "Extract collateral token from market params"
        target: "${inputs.caliber_helper}"
        selector: "extractElementFromStaticTuple(bytes,uint256)"
        parameters:
          - type: "(address,address,address,address,uint256)"
            value: "${returns.market_params}"
          - type: "uint256"
            value: "1"
        return:
          name: "collateral_token"
          type: "address"

      - description: "Extract oracle from market params"
        target: "${inputs.caliber_helper}"
        selector: "extractElementFromStaticTuple(bytes,uint256)"
        parameters:
          - type: "(address,address,address,address,uint256)"
            value: "${returns.market_params}"
          - type: "uint256"
            value: "2"
        return:
          name: "oracle"
          type: "address"

      - description: "Extract IRM from market params"
        target: "${inputs.caliber_helper}"
        selector: "extractElementFromStaticTuple(bytes,uint256)"
        parameters:
          - type: "(address,address,address,address,uint256)"
            value: "${returns.market_params}"
          - type: "uint256"
            value: "3"
        return:
          name: "irm"
          type: "address"

      - description: "Extract LLTV from market params"
        target: "${inputs.caliber_helper}"
        selector: "extractElementFromStaticTuple(bytes,uint256)"
        parameters:
          - type: "(address,address,address,address,uint256)"
            value: "${returns.market_params}"
          - type: "uint256"
            value: "4"
        return:
          name: "lltv"
          type: "uint256"

      - description: "Withdraw wsrUSD collateral from Morpho"
        target: "${inputs.morpho_address}"
        selector: "withdrawCollateral((address,address,address,address,uint256),uint256,address,address)"
        parameters:
          - type: "(address,address,address,address,uint256)"
            value:
              - type: "address"
                value: "${returns.loan_token}"
              - type: "address"
                value: "${returns.collateral_token}"
              - type: "address"
                value: "${returns.oracle}"
              - type: "address"
                value: "${returns.irm}"
              - type: "uint256"
                value: "${returns.lltv}"
          - type: "uint256"
            value: "${input_slots.collateral_amount}"
          - type: "address"
            value: "${inputs.caliber_address}"
          - type: "address"
            value: "${inputs.caliber_address}"

      - description: "Approve swap module to spend wsrUSD"
        target: ${inputs.wsrusd}
        selector: "approve(address,uint256)"
        parameters:
          - type: "address"
            value: "${inputs.swap_module}"
          - type: "uint256"
            value: "${input_slots.swap_data.inputAmount}"

      - description: "Swap wsrUSD to USDC via DEX aggregator"
        target: ${inputs.swap_module}
        selector: "swap((uint16,bytes,address,address,uint256,uint256))"
        parameters:
          - type: "(uint16,bytes,address,address,uint256,uint256)"
            value:
              - type: "uint16"
                value: "${input_slots.swap_data.swapperId}"
              - type: "bytes"
                value: "${input_slots.swap_data.data}"
              - type: "address"
                value: "${inputs.wsrusd}"
              - type: "address"
                value: "${constants.usdc}"
              - type: "uint256"
                value: "${input_slots.swap_data.inputAmount}"
              - type: "uint256"
                value: "${input_slots.swap_data.minOutputAmount}"

    input_slots:
      collateral_amount:
        type: "uint256"
        description: "The amount of wsrUSD collateral to withdraw from Morpho."
      swap_data:
        type: "SwapData"
        description: "Swap data for wsrUSD -> USDC conversion."
