protocol: "morpho-loop"

inputs:
  collateral_vault:
    type: "address"
  flash_loan_token:
    type: "address"
  morpho_address:
    type: "address"
  caliber_helper:
    type: "address"
  morpho_market_id:
    type: "bytes32"
  caliber_address:
    type: "address"

actions:
  loop_in:
    # 1. We have on the wallet, after the flash loan, the equity + flash loaned amount
    # 2. Approve the collateral vault (ERC4626) to spend our flash loan token
    # 3. Deposit into collateral vault to mint collateral token
    # 4. Approve Morpho to spend the collateral token
    # 5. Supply collateral to Morpho
    # 6. Borrow the flash loan amount from Morpho to repay the flash loan
    calls:
      - description: "Approve the collateral vault to spend our flash loan token"
        target: ${inputs.flash_loan_token}
        selector: "approve(address,uint256)"
        parameters:
          - type: "address"
            value: "${inputs.collateral_vault}"
          - type: "uint256"
            value: "${input_slots.deposit_amount}"

      - description: "Deposit into the collateral vault (ERC4626) to mint collateral token"
        target: ${inputs.collateral_vault}
        selector: "deposit(uint256,address)"
        parameters:
          - type: "uint256"
            value: "${input_slots.deposit_amount}"
          - type: "address"
            value: "${inputs.caliber_address}"
        return:
          type: "uint256"
          name: "collateral_shares"

      - description: "Approve Morpho to transfer the collateral"
        target: ${inputs.collateral_vault}
        selector: "approve(address,uint256)"
        parameters:
          - type: "address"
            value: "${inputs.morpho_address}"
          - type: "uint256"
            value: "${returns.collateral_shares}"

      - description: "Get market parameters from ID"
        target: "${inputs.morpho_address}"
        selector: "idToMarketParams(bytes32)"
        parameters:
          - type: "bytes32"
            value: "${inputs.morpho_market_id}"
        return:
          name: "market_params"
          type: "(address,address,address,address,uint256)"

      - description: "Extract loan token from market params"
        target: "${inputs.caliber_helper}"
        selector: "extractElementFromStaticTuple(bytes,uint256)"
        parameters:
          - type: "(address,address,address,address,uint256)"
            value: "${returns.market_params}"
          - type: "uint256"
            value: "0"
        return:
          name: "loan_token"
          type: "address"

      - description: "Extract collateral token from market params"
        target: "${inputs.caliber_helper}"
        selector: "extractElementFromStaticTuple(bytes,uint256)"
        parameters:
          - type: "(address,address,address,address,uint256)"
            value: "${returns.market_params}"
          - type: "uint256"
            value: "1"
        return:
          name: "collateral_token"
          type: "address"

      - description: "Extract oracle from market params"
        target: "${inputs.caliber_helper}"
        selector: "extractElementFromStaticTuple(bytes,uint256)"
        parameters:
          - type: "(address,address,address,address,uint256)"
            value: "${returns.market_params}"
          - type: "uint256"
            value: "2"
        return:
          name: "oracle"
          type: "address"

      - description: "Extract IRM from market params"
        target: "${inputs.caliber_helper}"
        selector: "extractElementFromStaticTuple(bytes,uint256)"
        parameters:
          - type: "(address,address,address,address,uint256)"
            value: "${returns.market_params}"
          - type: "uint256"
            value: "3"
        return:
          name: "irm"
          type: "address"

      - description: "Extract LLTV from market params"
        target: "${inputs.caliber_helper}"
        selector: "extractElementFromStaticTuple(bytes,uint256)"
        parameters:
          - type: "(address,address,address,address,uint256)"
            value: "${returns.market_params}"
          - type: "uint256"
            value: "4"
        return:
          name: "lltv"
          type: "uint256"

      - description: "Supply collateral to Morpho"
        target: "${inputs.morpho_address}"
        selector: "supplyCollateral((address,address,address,address,uint256),uint256,address,bytes)"
        parameters:
          - type: "(address,address,address,address,uint256)"
            value:
              - type: "address"
                value: "${returns.loan_token}"
              - type: "address"
                value: "${returns.collateral_token}"
              - type: "address"
                value: "${returns.oracle}"
              - type: "address"
                value: "${returns.irm}"
              - type: "uint256"
                value: "${returns.lltv}"
          - type: "uint256"
            value: "${returns.collateral_shares}"
          - type: "address"
            value: "${inputs.caliber_address}"
          - type: "bytes"
            value: "0x"

      - description: "Borrow the flash loaned amount from Morpho"
        target: "${inputs.morpho_address}"
        selector: "borrow((address,address,address,address,uint256),uint256,uint256,address,address)"
        parameters:
          - type: "(address,address,address,address,uint256)"
            value:
              - type: "address"
                value: "${returns.loan_token}"
              - type: "address"
                value: "${returns.collateral_token}"
              - type: "address"
                value: "${returns.oracle}"
              - type: "address"
                value: "${returns.irm}"
              - type: "uint256"
                value: "${returns.lltv}"
          - type: "uint256"
            value: "${input_slots.flash_loan_amount}"
          - type: "uint256"
            value: "0"
          - type: "address"
            value: "${inputs.caliber_address}"
          - type: "address"
            value: "${inputs.caliber_address}"

    input_slots:
      deposit_amount:
        type: "uint256"
        description: "The total amount to deposit into the collateral vault (equity + flash_loan_amount)."
      flash_loan_amount:
        type: "uint256"
        description: "The amount of the flash loan."
