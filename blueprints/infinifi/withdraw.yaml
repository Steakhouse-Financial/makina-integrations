protocol: "infinifi"

# Infinifi Withdraw Blueprint
# Two-step withdrawal process with KV store for timestamp tracking:
#
# 1. start_unwinding - Burns share tokens, creates unwinding position, stores timestamp in KV store
# 2. withdraw - Claims iUSD after lock period, reads timestamp from KV store, clears KV store
#
# Each bucket (lock duration) should use a unique KV storage key to avoid conflicts.
# Example key: keccak256("infinifi_unwinding_ts_1") for 1-week bucket

constants:
  context_helper_address:
    type: "address"
    value: "0x0f431322E1fF2500D4C5a4E090A7Da7344F953BE"
  math_helper_address:
    type: "address"
    value: "0x3D623B199E290358416415eA7e05B635E442e3c0"
  boolean_helper_address:
    type: "address"
    value: "0x00c93e3b09Ca2f544487d4298339765EadCD8353"
  gateway_address:
    type: "address"
    value: "0x3f04b65Ddbd87f9CE0A2e7Eb24d80e7fb87625b5"

inputs:
  share_token_address:
    type: "address"
  unwinding_epochs:
    type: "uint32"
  kv_store_address:
    type: "address"
  kv_storage_key:
    type: "bytes32"

actions:
  # Step 1 (relative): Start Unwinding with percentage
  # Unwinds a percentage of the share token balance
  start_unwinding_relative:
    calls:
      # Check that there's no existing unwinding position for this bucket
      - description: "Get existing unwinding timestamp from KV store"
        target: "${inputs.kv_store_address}"
        selector: "get(bytes32)"
        parameters:
          - type: "bytes32"
            value: "${inputs.kv_storage_key}"
        return:
          name: "existing_timestamp"
          type: "uint256"

      - description: "Check if no existing unwinding (timestamp should be 0)"
        target: "${constants.math_helper_address}"
        selector: "eq(uint256,uint256)"
        parameters:
          - type: "uint256"
            value: "${returns.existing_timestamp}"
          - type: "uint256"
            value: "0"
        return:
          name: "no_existing_unwinding"
          type: "bool"

      - description: "Revert if there's already an unwinding position"
        target: "${constants.boolean_helper_address}"
        selector: "revertIfFalse(bool)"
        parameters:
          - type: "bool"
            value: "${returns.no_existing_unwinding}"

      - description: "Get caliber's address"
        target: ${constants.context_helper_address}
        selector: "msgSender()"
        parameters: []
        return:
          name: "caliber_address"
          type: "address"

      # Calculate shares to unwind
      - description: "Get share token balance"
        target: "${inputs.share_token_address}"
        selector: "balanceOf(address)"
        parameters:
          - type: "address"
            value: "${returns.caliber_address}"
        return:
          name: "share_balance"
          type: "uint256"

      - description: "Calculate shares to unwind based on percentage"
        target: "${constants.math_helper_address}"
        selector: "mulDiv(uint256,uint256,uint256)"
        parameters:
          - type: "uint256"
            value: "${returns.share_balance}"
          - type: "uint256"
            value: "${input_slots.bps_to_unwind}"
          - type: "uint256"
            value: "10000"
        return:
          name: "shares_to_unwind"
          type: "uint256"

      # Approve and start unwinding
      - description: "Approve share token spending by the Gateway"
        target: "${inputs.share_token_address}"
        selector: "approve(address,uint256)"
        parameters:
          - type: "address"
            value: "${constants.gateway_address}"
          - type: "uint256"
            value: "${returns.shares_to_unwind}"

      - description: "Start unwinding - burns shares and creates unwinding position"
        target: "${constants.gateway_address}"
        selector: "startUnwinding(uint256,uint32)"
        parameters:
          - type: "uint256"
            value: "${returns.shares_to_unwind}"
          - type: "uint32"
            value: "${inputs.unwinding_epochs}"

      # Capture and store the timestamp
      - description: "Get block timestamp (this is the unwinding_timestamp)"
        target: "${constants.context_helper_address}"
        selector: "blockTimestamp()"
        parameters: []
        return:
          name: "unwinding_timestamp"
          type: "uint256"

      - description: "Store unwinding timestamp in KV store"
        target: "${inputs.kv_store_address}"
        selector: "set(bytes32,bytes32)"
        parameters:
          - type: "bytes32"
            value: "${inputs.kv_storage_key}"
          - type: "uint256"
            value: "${returns.unwinding_timestamp}"

    input_slots:
      bps_to_unwind:
        type: "uint256"
        description: "Basis points of share balance to unwind (10000 = 100%)"

  # Step 2: Complete Withdraw
  # Claims iUSD after the lock period has expired
  # Reads timestamp from KV store and clears it after withdrawal
  complete_withdraw:
    calls:
      # Get timestamp from KV store
      - description: "Get unwinding timestamp from KV store"
        target: "${inputs.kv_store_address}"
        selector: "get(bytes32)"
        parameters:
          - type: "bytes32"
            value: "${inputs.kv_storage_key}"
        return:
          name: "unwinding_timestamp"
          type: "uint256"

      # Verify there's an active unwinding position
      - description: "Check if there's an unwinding position (timestamp > 0)"
        target: "${constants.math_helper_address}"
        selector: "eq(uint256,uint256)"
        parameters:
          - type: "uint256"
            value: "${returns.unwinding_timestamp}"
          - type: "uint256"
            value: "0"
        return:
          name: "no_unwinding"
          type: "bool"

      - description: "Revert if no unwinding position exists"
        target: "${constants.boolean_helper_address}"
        selector: "revertIfTrue(bool)"
        parameters:
          - type: "bool"
            value: "${returns.no_unwinding}"

      - description: "Get caliber's address"
        target: ${constants.context_helper_address}
        selector: "msgSender()"
        parameters: []
        return:
          name: "caliber_address"
          type: "address"

      # Withdraw iUSD
      - description: "Withdraw iUSD after unwinding period has elapsed"
        target: "${constants.gateway_address}"
        selector: "withdraw(uint256)"
        parameters:
          - type: "uint256"
            value: "${returns.unwinding_timestamp}"

      # Clear the KV store
      - description: "Clear unwinding timestamp from KV store"
        target: "${inputs.kv_store_address}"
        selector: "set(bytes32,bytes32)"
        parameters:
          - type: "bytes32"
            value: "${inputs.kv_storage_key}"
          - type: "uint256"
            value: "0"
